<!doctype html>
<html lang="zh-CN" class="dark" style="color-scheme: dark;" suppressHydrationWarning>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.png" type="image/png">
    <title>Fance OS - 技能驱动，智能无限</title>
    <meta name="description" content="Fance OS - Agent Skills 驱动的智能体构建平台" />
    <meta name="author" content="Fance OS" />
    <meta name="theme-color" content="#09090b" />

    <meta property="og:title" content="Fance OS" />
    <meta property="og:description" content="技能驱动，智能无限 - Agent Skills 驱动的智能体构建平台" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@FanceOS" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <!-- NUCLEAR: Critical inline styles to prevent FOUC and ensure dark mode -->
    <style>
      /* Force dark mode styles before any CSS loads */
      html, body {
        background-color: #09090b !important;
        color: #f5f5f5 !important;
        min-height: 100vh;
        margin: 0;
        padding: 0;
      }
      /* Prevent flash of unstyled content */
      html:not(.light):not(.dark) { visibility: hidden; }
      html.light, html.dark { visibility: visible; }
      /* Critical z-index for overlays */
      [data-radix-portal] { z-index: 9999 !important; }
    </style>

    <!-- Theme initialization script - prevents FOUC -->
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('theme');
          // Default dark mode is already set in HTML, only switch if explicitly light
          if (theme === 'light') {
            document.documentElement.classList.remove('dark');
            document.documentElement.classList.add('light');
            document.documentElement.style.colorScheme = 'light';
            document.body.style.backgroundColor = '#fafafa';
            document.body.style.color = '#09090b';
          } else if (theme === 'system') {
            var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (!systemDark) {
              document.documentElement.classList.remove('dark');
              document.documentElement.classList.add('light');
              document.documentElement.style.colorScheme = 'light';
              document.body.style.backgroundColor = '#fafafa';
              document.body.style.color = '#09090b';
            }
          }
          // For dark or no theme, keep the default dark class
        } catch (e) {
          // Keep dark as fallback (already set in HTML)
        }
      })();
    </script>
  </head>

  <body style="background-color: #09090b; color: #f5f5f5; min-height: 100vh; margin: 0;">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
